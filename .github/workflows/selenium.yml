name: Run Selenium Script 

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - '**.txt'
  workflow_dispatch:
    inputs:
      use_session_cache:
        description: "Use session cache"
        required: false
        default: "false"
      start_or_stop:
        description: "start or stop"
        required: false
        default: "true"

jobs:
  run-selenium:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set Up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          
      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('.github/workflows/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
            
      - name: Install Dependencies
        run: pip install -r .github/workflows/requirements.txt

      - name: Install jq
        run: sudo apt-get install -y jq unzip

      - name: Cache Opera GX and ChromeDriver
        id: opera-cache
        uses: actions/cache@v4
        with:
          path: |
            /opt/opera-gx
            /usr/local/bin/chromedriver
          key: opera-cache-v1

      - name: Install Opera GX and ChromeDriver
        if: steps.opera-cache.outputs.cache-hit != 'true'
        run: |
          # Download and install Opera GX .deb package
          wget -O opera-gx.deb "https://download3.operacdn.com/pub/opera_gx/latest/linux/opera-gx-stable_amd64.deb"
          sudo apt-get install -y ./opera-gx.deb

          # Find where it actually installed to (commonly /usr/bin/opera-gx)
          which opera-gx || echo "opera-gx binary not found at expected path — check install output above"
          sudo mkdir -p /opt/opera-gx
          sudo ln -sf $(which opera-gx) /opt/opera-gx/opera-gx

          # ChromeDriver still needed - Opera GX is Chromium-based, so the
          # matching Chromium version's driver works, but pin a recent stable one.
          LATEST_VERSION=$(curl -s https://googlechromelabs.github.io/chrome-for-testing/last-known-good-versions-with-downloads.json | jq -r '.channels.Stable.version')
          DRIVER_URL="https://edgedl.me.gvt1.com/edgedl/chrome/chrome-for-testing/${LATEST_VERSION}/linux64/chromedriver-linux64.zip"
          wget "$DRIVER_URL" -O chromedriver.zip
          unzip -q chromedriver.zip
          chmod +x chromedriver-linux64/chromedriver
          sudo mv chromedriver-linux64/chromedriver /usr/local/bin/chromedriver

      - name: Debug Secrets
        env:
          USERNAME: ${{ secrets.USERNAME }}
        run: echo "USERNAME is $USERNAME"

      - name: Restore Session Cache
        if: ${{ inputs.use_session_cache == 'true' }}
        id: restore-session
        uses: actions/cache/restore@v4
        with:
          path: /tmp/seedloaf-session
          key: seedloaf-session-cache-${{ github.run_id }}
          restore-keys: |
            seedloaf-session-cache-

      - name: Run Selenium Start Script
        if: ${{ inputs.start_or_stop == 'true' }}
        env:
          USERNAME: ${{ secrets.USERNAME }}
          PASSWORD: ${{ secrets.PASSWORD }}
        run: python .github/workflows/websitebotex.py

      - name: Run Selenium Stop Script
        if: ${{ inputs.start_or_stop == 'false' }}
        env:
          USERNAME: ${{ secrets.USERNAME }}
          PASSWORD: ${{ secrets.PASSWORD }}
        run: python .github/workflows/websitebotstop.py

      - name: Check for new session
        if: ${{ inputs.use_session_cache == 'true' }}
        id: session-check
        run: |
          if [ -f /tmp/seedloaf-session/.valid_session ]; then
            echo "valid=true" >> $GITHUB_OUTPUT
          else
            echo "valid=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Save session cache
        if: ${{ inputs.use_session_cache == 'true' && steps.session-check.outputs.valid == 'true' }}
        uses: actions/cache/save@v4
        continue-on-error: true
        with:
          path: /tmp/seedloaf-session
          key: seedloaf-session-cache-${{ github.run_number }}

name: Run Selenium Script 

on:
  workflow_dispatch:
    inputs:
      use_session_cache:
        description: "Use session cache"
        required: false
        default: "false"
      start_or_stop:
        description: "start or stop"
        required: false
        default: "true"

jobs:
  run-selenium:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set Up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          
      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('.github/workflows/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
            
      - name: Install Dependencies
        run: pip install -r .github/workflows/requirements.txt

      - name: Install jq
        run: sudo apt-get install -y jq unzip

      - name: Install Opera GX and ChromeDriver
        run: |
          # Add Opera's official APT repository and install Opera GX through it.
          wget -qO- https://deb.opera.com/archive.key | sudo gpg --dearmor -o /usr/share/keyrings/opera-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/opera-archive-keyring.gpg arch=amd64] https://deb.opera.com/opera-gx-stable/ stable non-free" | sudo tee /etc/apt/sources.list.d/opera-gx-stable.list

          sudo apt-get update
          sudo apt-get install -y opera-gx-stable

          # Confirm where it actually installed - do NOT symlink into a cached
          # folder, since caching just the symlink (not the real binary) causes
          # a dangling link on future runs if apt install gets skipped.
          OPERA_BIN=$(which opera-gx || echo "")
          if [ -z "$OPERA_BIN" ]; then
            echo "ERROR: opera-gx binary not found after install."
            dpkg -L opera-gx-stable || true
            exit 1
          fi
          echo "Found Opera GX at: $OPERA_BIN"
          echo "OPERA_GX_PATH=$OPERA_BIN" >> $GITHUB_ENV

          # ChromeDriver still works to drive Opera GX since it's Chromium-based
          LATEST_VERSION=$(curl -s https://googlechromelabs.github.io/chrome-for-testing/last-known-good-versions-with-downloads.json | jq -r '.channels.Stable.version')
          DRIVER_URL="https://edgedl.me.gvt1.com/edgedl/chrome/chrome-for-testing/${LATEST_VERSION}/linux64/chromedriver-linux64.zip"
          wget "$DRIVER_URL" -O chromedriver.zip
          unzip -q chromedriver.zip
          chmod +x chromedriver-linux64/chromedriver
          sudo mv chromedriver-linux64/chromedriver /usr/local/bin/chromedriver

      - name: Debug Secrets
        env:
          USERNAME: ${{ secrets.USERNAME }}
        run: echo "USERNAME is $USERNAME"

      - name: Debug Inputs
        run: |
          echo "inputs.start_or_stop = '${{ inputs.start_or_stop }}'"
          echo "inputs.use_session_cache = '${{ inputs.use_session_cache }}'"
          echo "github.event.inputs.start_or_stop = '${{ github.event.inputs.start_or_stop }}'"
          echo "github.event_name = '${{ github.event_name }}'"

      - name: Debug Opera GX
        run: |
          set +e
          file /usr/bin/opera-gx
          ls -l /usr/bin/opera-gx
          opera-gx --version
          opera-gx --headless=new about:blank
          echo "Exit code: $?"
      
      - name: Restore Session Cache
        if: ${{ inputs.use_session_cache == 'true' }}
        id: restore-session
        uses: actions/cache/restore@v4
        with:
          path: /tmp/seedloaf-session
          key: seedloaf-session-cache-${{ github.run_id }}
          restore-keys: |
            seedloaf-session-cache-

      - name: Run Selenium Start Script
        if: ${{ inputs.start_or_stop == 'true' }}
        env:
          USERNAME: ${{ secrets.USERNAME }}
          PASSWORD: ${{ secrets.PASSWORD }}
        run: python .github/workflows/websitebotex.py

      - name: Run Selenium Stop Script
        if: ${{ inputs.start_or_stop == 'false' }}
        env:
          USERNAME: ${{ secrets.USERNAME }}
          PASSWORD: ${{ secrets.PASSWORD }}
        run: python .github/workflows/websitebotstop.py

      - name: Check for new session
        if: ${{ inputs.use_session_cache == 'true' }}
        id: session-check
        run: |
          if [ -f /tmp/seedloaf-session/.valid_session ]; then
            echo "valid=true" >> $GITHUB_OUTPUT
          else
            echo "valid=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Save session cache
        if: ${{ inputs.use_session_cache == 'true' && steps.session-check.outputs.valid == 'true' }}
        uses: actions/cache/save@v4
        continue-on-error: true
        with:
          path: /tmp/seedloaf-session
          key: seedloaf-session-cache-${{ github.run_number }}
